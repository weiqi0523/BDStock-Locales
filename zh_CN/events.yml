# =================================================================
# BDStock 隨機事件設定檔
# =================================================================
# 為每支股票定義專屬的隨機事件。
# 當事件被觸發時，股價會根據 multiplier 範圍進行調整。
#
# 格式:
#   股票ID:
#     positive:    (利多事件 - 股價上漲)
#       - message: "廣播訊息 (支援 %stock_name%, %old_price%, %new_price%)"
#         min_multiplier: 1.05   (最小價格倍率，1.05 = 漲 5%)
#         max_multiplier: 1.15   (最大價格倍率，1.15 = 漲 15%)
#     negative:    (利空事件 - 股價下跌)
#       - message: "廣播訊息"
#         min_multiplier: 0.85   (最小價格倍率，0.85 = 跌 15%)
#         max_multiplier: 0.95   (最大價格倍率，0.95 = 跌 5%)
#
# 提示:
#   - multiplier > 1.0 表示上漲, < 1.0 表示下跌
#   - 利多事件的 multiplier 通常 > 1.0
#   - 利空事件的 multiplier 通常 < 1.0
#   - 每次觸發會從該股票的事件列表中隨機選一個
#   - 可為每支股票設定多個不同的事件
#
# 修改後使用 /stock reload 重新載入
# =================================================================

# 範例股票事件 (請替換為你的股票ID):
 MYCOMP:
   positive:
     - message: "&a[利多] %stock_name% 獲得大額訂單！股價從 $%old_price% 漲至 $%new_price%"
       min_multiplier: 1.05
       max_multiplier: 1.20
     - message: "&a[利多] %stock_name% 發布亮眼財報！股價從 $%old_price% 漲至 $%new_price%"
       min_multiplier: 1.03
       max_multiplier: 1.10
   negative:
     - message: "&c[利空] %stock_name% 被爆出品質問題！股價從 $%old_price% 跌至 $%new_price%"
       min_multiplier: 0.80
       max_multiplier: 0.95
     - message: "&c[利空] %stock_name% 主要客戶轉單！股價從 $%old_price% 跌至 $%new_price%"
       min_multiplier: 0.85
       max_multiplier: 0.97
